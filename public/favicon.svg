<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="55%" stop-color="#f0469a"/>
      <stop offset="100%" stop-color="#ffb648"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f9a8d4" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <!-- Aurora gradient background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect width="32" height="32" rx="7" fill="url(#glow)"/>
  <!-- Central dot -->
  <circle cx="16" cy="16" r="2.2" stroke="white" stroke-width="1.5" fill="none"/>
  <!-- Outer circle -->
  <circle cx="16" cy="16" r="7.5" stroke="white" stroke-width="1.4" fill="none" stroke-opacity="0.9"/>
  <!-- Ellipse orbit 1 -->
  <ellipse cx="16" cy="16" rx="7.5" ry="3" stroke="white" stroke-width="1.4" fill="none" stroke-opacity="0.9" transform="rotate(-30 16 16)"/>
  <!-- Ellipse orbit 2 -->
  <ellipse cx="16" cy="16" rx="7.5" ry="3" stroke="white" stroke-width="1.4" fill="none" stroke-opacity="0.9" transform="rotate(30 16 16)"/>
</svg>

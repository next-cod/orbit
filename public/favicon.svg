<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Black rounded square background -->
  <rect width="32" height="32" rx="7" fill="#1f1f29"/>
  <!-- Orbit icon (lucide-orbit style) centered and slightly enlarged -->
  <!-- Central circle -->
  <circle cx="16" cy="16" r="2.2" stroke="white" stroke-width="1.5" fill="none"/>
  <!-- Outer circle -->
  <circle cx="16" cy="16" r="7.5" stroke="white" stroke-width="1.5" fill="none"/>
  <!-- Ellipse orbit 1 (tilted ~30deg) -->
  <ellipse cx="16" cy="16" rx="7.5" ry="3" stroke="white" stroke-width="1.5" fill="none" transform="rotate(-30 16 16)"/>
  <!-- Ellipse orbit 2 (tilted ~-30deg) -->
  <ellipse cx="16" cy="16" rx="7.5" ry="3" stroke="white" stroke-width="1.5" fill="none" transform="rotate(30 16 16)"/>
</svg>
